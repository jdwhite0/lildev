<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lil Dev — V1 Prototype</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: radial-gradient(ellipse at 42% 46%, #05081a 0%, #020208 55%, #010105 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }
    .stage-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .stage {
      position: relative;
      width: 280px;
      height: 280px;
      overflow: visible;
      cursor: pointer;
    }
    .label {
      letter-spacing: 0.30em;
      font-size: 10px;
      color: rgba(180, 210, 255, 0.55);
      text-transform: uppercase;
    }
    .note {
      font-size: 10px;
      color: rgba(160, 185, 220, 0.28);
      letter-spacing: 0.10em;
      text-align: center;
      line-height: 2.0;
    }
  </style>
</head>
<body>

<div class="stage-wrap">
  <div class="stage"></div>
  <div class="label">Lil Dev</div>
  <div class="note">
    V1 Prototype — Iridescent Crystal World<br>
    jdwhite.world galaxy system
  </div>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.min.js';

const stage = document.querySelector('.stage');
const SZ = 280;

const canvas = document.createElement('canvas');
stage.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(SZ, SZ);
canvas.style.cssText = `position:absolute;top:0;left:0;width:${SZ}px;height:${SZ}px;display:block;`;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.14;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(44, 1, 0.1, 100);
camera.position.set(0, 0, 4.8);

/* Light direction — same galaxy sun as JD Productions */
const lightDir = new THREE.Vector3(0.60, 0.48, 0.64).normalize();

const world = new THREE.Group();
scene.add(world);

/* ═══════════════════════════════════════════════════
   PLANET SHADERS — iridescent crystal world
═══════════════════════════════════════════════════ */
const planetVert = `
  varying vec3 vWorldNormal;varying vec3 vViewDir;varying vec3 vLocalPos;
  void main(){
    vLocalPos=position;
    vec4 wp=modelMatrix*vec4(position,1.0);
    vWorldNormal=normalize(mat3(modelMatrix)*normal);
    vViewDir=normalize(cameraPosition-wp.xyz);
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
  }`;

const planetFrag = `
  uniform vec3 uLightDir;uniform vec3 uLightColor;uniform vec3 uAmbient;
  varying vec3 vWorldNormal;varying vec3 vViewDir;varying vec3 vLocalPos;

  float h3(vec3 p){p=fract(p*vec3(443.897,397.297,491.187));p+=dot(p,p.yxz+19.19);return fract(p.x*p.y*p.z);}
  float vn(vec3 p){vec3 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);return mix(mix(mix(h3(i),h3(i+vec3(1,0,0)),u.x),mix(h3(i+vec3(0,1,0)),h3(i+vec3(1,1,0)),u.x),u.y),mix(mix(h3(i+vec3(0,0,1)),h3(i+vec3(1,0,1)),u.x),mix(h3(i+vec3(0,1,1)),h3(i+vec3(1,1,1)),u.x),u.y),u.z);}
  float fbm(vec3 p){float v=0.,a=0.52;for(int i=0;i<5;i++){v+=a*vn(p);p=p*2.10+vec3(1.73,2.17,0.93);a*=0.48;}return v;}
  float fbm3(vec3 p){float v=0.,a=0.52;for(int i=0;i<3;i++){v+=a*vn(p);p=p*2.10+vec3(2.13,0.87,1.61);a*=0.48;}return v;}

  void main(){
    vec3 pos=normalize(vLocalPos);

    /* Smooth organic crystal terrain — gentle domain warp */
    float wx=fbm(pos*1.38+vec3(1.12,3.44,0.88)),wy=fbm(pos*1.38+vec3(4.21,7.08,2.55));
    vec3 wPos=pos+vec3(wx-.5,wy-.5,0.)*.36;
    float n1=fbm(wPos*1.80);          /* broad crystal landmass */
    float n2=fbm(pos*5.50+vec3(2.1,1.7,4.3));   /* medium crystal facets */
    float n3=fbm3(pos*11.2+vec3(5.4,3.1,7.8));  /* fine surface texture */
    float terrain=n1*.56+n2*.30+n3*.14;

    /* Crystal surface color — deep sapphire base to pearlescent peaks */
    vec3 c0=vec3(0.05,0.06,0.20);   /* deep crystal core */
    vec3 c1=vec3(0.18,0.32,0.62);   /* mid crystal blue */
    vec3 c2=vec3(0.72,0.84,1.00);   /* pearlescent peak */
    vec3 baseCol=mix(mix(c0,c1,smoothstep(.18,.55,terrain)),c2,smoothstep(.52,.90,terrain));

    vec3 N=normalize(vWorldNormal),L=normalize(uLightDir),V=normalize(vViewDir),H=normalize(L+V);
    float NdotL=dot(N,L),NdotV=max(dot(N,V),0.),NdotH=max(dot(N,H),0.);
    float diffuse=pow(smoothstep(-.20,.30,NdotL),.80);

    /* Crystal specular — sharp, clear, high shininess */
    float spec=( pow(NdotH,58.)*.18 + pow(NdotH,200.)*.24 )*diffuse;

    /* Inner crystal luminosity — peaks glow softly from within */
    float peakGlow=smoothstep(.52,.92,terrain)*.11;
    vec3 glowHue=mix(vec3(.28,.68,1.0),vec3(.72,.90,1.0),terrain);

    vec3 lit=baseCol*(uAmbient+uLightColor*diffuse*.80)+uLightColor*spec;
    lit+=glowHue*peakGlow;

    /* Iridescence — view-angle thin-film color shift (the signature feature) */
    float iridBase=pow(1.0-NdotV,1.5);

    /* 4-stop gradient: face-on near-white → sky blue → mint → warm gold at edges */
    float t=clamp(iridBase*3.2,0.,3.);
    vec3 iC0=vec3(0.90,0.95,1.00);  /* near-white */
    vec3 iC1=vec3(0.34,0.80,1.00);  /* sky blue */
    vec3 iC2=vec3(0.26,0.96,0.70);  /* mint green */
    vec3 iC3=vec3(1.00,0.88,0.50);  /* warm gold */
    vec3 iridCol=mix(iC0,iC1,clamp(t,0.,1.));
    iridCol=mix(iridCol,iC2,clamp(t-1.,0.,1.));
    iridCol=mix(iridCol,iC3,clamp(t-2.,0.,1.));

    /* Iridescence: brighter on lit terrain, still a hint in shadow via emissive */
    float iridStrength=iridBase*(0.28+terrain*.40);
    lit+=iridCol*(iridStrength*diffuse*.36+peakGlow*.20);

    /* Fresnel rim — warm pearlescent white, inviting, not harsh */
    float fresnel=pow(1.0-NdotV,2.0);
    vec3 rimHue=mix(vec3(.65,.82,1.0),vec3(1.0,.94,.80),smoothstep(-.3,.6,NdotL));
    lit+=rimHue*fresnel*.20;

    gl_FragColor=vec4(lit,1.0);
  }`;

/* ═══════════════════════════════════════════════════
   ATMOSPHERE — cloud-like blue-white haze,
   more prominent than JD Productions (living world)
═══════════════════════════════════════════════════ */
const atmoVert = `
  varying vec3 vWorldNormal;varying vec3 vViewDir;
  void main(){
    vec4 wp=modelMatrix*vec4(position,1.0);
    vWorldNormal=normalize(mat3(modelMatrix)*normal);
    vViewDir=normalize(cameraPosition-wp.xyz);
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
  }`;
const atmoFrag = `
  uniform vec3 uLightDir;varying vec3 vWorldNormal;varying vec3 vViewDir;
  void main(){
    vec3 N=normalize(vWorldNormal),V=normalize(vViewDir),L=normalize(uLightDir);
    float NdotV=max(dot(N,V),0.),NdotL=dot(N,L);
    float fresnel=pow(1.-NdotV,3.5);
    float litGate=smoothstep(-.22,.55,NdotL);
    /* Lit side: sky blue-white. Shadow: very faint cool edge */
    vec3 col=mix(vec3(.04,.08,.22),vec3(.50,.76,1.00),litGate);
    float alpha=fresnel*(litGate*.28+(1.-litGate)*.018);
    gl_FragColor=vec4(col,alpha);
  }`;

/* ── Planet mesh ── */
const planet = new THREE.Mesh(
  new THREE.SphereGeometry(1.0, 128, 128),
  new THREE.ShaderMaterial({
    uniforms: {
      uLightDir:   { value: lightDir },
      uLightColor: { value: new THREE.Color(1.00, 0.97, 0.92) },
      uAmbient:    { value: new THREE.Color(0.008, 0.010, 0.022) },
    },
    vertexShader: planetVert,
    fragmentShader: planetFrag,
  })
);
world.add(planet);

/* ── Atmosphere ── */
const atmo = new THREE.Mesh(
  new THREE.SphereGeometry(1.052, 32, 32),
  new THREE.ShaderMaterial({
    uniforms: { uLightDir: { value: lightDir } },
    vertexShader: atmoVert,
    fragmentShader: atmoFrag,
    side: THREE.BackSide, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
  })
);
world.add(atmo);

/* ═══════════════════════════════════════════════════
   SPARKLE CLOUD — imagination orbiting the world
   3D distribution (not a flat ring) — feels alive
═══════════════════════════════════════════════════ */
let sparkles;
{
  const N = 110;
  const pos = new Float32Array(N * 3);
  const alp = new Float32Array(N);
  const siz = new Float32Array(N);
  const phs = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = (Math.random() - 0.5) * Math.PI * 0.68;  /* spread ±61° from equator */
    const r     = 1.18 + Math.random() * 0.44;              /* 1.18 — 1.62 */
    pos[i*3]   = Math.cos(phi) * Math.cos(theta) * r;
    pos[i*3+1] = Math.sin(phi) * r;
    pos[i*3+2] = Math.cos(phi) * Math.sin(theta) * r;
    alp[i] = 0.24 + Math.random() * 0.44;
    siz[i] = Math.random();
    phs[i] = Math.random() * Math.PI * 2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('alpha',    new THREE.BufferAttribute(alp, 1));
  geo.setAttribute('size',     new THREE.BufferAttribute(siz, 1));
  geo.setAttribute('phase',    new THREE.BufferAttribute(phs, 1));

  sparkles = new THREE.Points(geo, new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0.0 } },
    vertexShader: `
      attribute float alpha;attribute float size;attribute float phase;
      uniform float uTime;
      varying float vA;varying float vSz;varying float vTwinkle;
      void main(){
        vA=alpha;vSz=size;
        /* Per-particle twinkle using baked phase offset */
        vTwinkle=0.50+0.50*sin(uTime*2.60+phase);
        float baseSize=mix(0.90,3.40,size);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=baseSize*(360./-mv.z);
        gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader: `
      varying float vA;varying float vSz;varying float vTwinkle;
      void main(){
        vec2 uv=gl_PointCoord-.5;
        float d=length(uv);
        /* Soft circular core + subtle 4-point star gleam */
        float core=exp(-d*d*56.);
        float arm1=exp(-uv.x*uv.x*160.-uv.y*uv.y*18.)*.18;
        float arm2=exp(-uv.y*uv.y*160.-uv.x*uv.x*18.)*.18;
        float sparkle=core+arm1+arm2;
        float a=clamp(sparkle*vA*vTwinkle,0.,1.);
        /* Color: cool white core blending to soft gold for larger sparkles */
        vec3 col=mix(vec3(.74,.90,1.0),vec3(1.0,.94,.66),vSz*.55);
        gl_FragColor=vec4(col,a*.82);
      }`,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: true,
  }));
  world.add(sparkles);
}

/* ── Mouse parallax ── */
let tgtX=0, tgtY=0, curX=0, curY=0;
document.addEventListener('mousemove', e => {
  tgtY = ((e.clientX / window.innerWidth)  - 0.5) * 0.18;
  tgtX = ((e.clientY / window.innerHeight) - 0.5) * 0.10;
});

/* ── Render loop — four independent motion layers ── */
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  curX += (tgtX - curX) * 0.022;
  curY += (tgtY - curY) * 0.022;

  /* Planet: slow curious rotation */
  planet.rotation.y = t * 0.030 + curY;
  planet.rotation.x = curX * 0.60;

  /* Atmosphere: slightly different rate, gentle axis drift */
  atmo.rotation.y = t * 0.036;
  atmo.rotation.x = Math.sin(t * 0.026) * 0.016;

  /* Sparkles: slow 3D cloud rotation — imagination circling the world */
  sparkles.rotation.y = t * 0.016;
  sparkles.rotation.z = Math.sin(t * 0.038) * 0.028;
  sparkles.rotation.x = Math.sin(t * 0.022) * 0.020;
  sparkles.material.uniforms.uTime.value = t;

  /* World group: gravitational float + mouse depth */
  world.position.x = Math.sin(t * 0.024) * 0.042 + curY * 0.28;
  world.position.y = Math.cos(t * 0.018) * 0.030 - curX * 0.16;

  renderer.render(scene, camera);
})();
</script>

</body>
</html>
